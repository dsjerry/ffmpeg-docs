<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D32F2F"/>
      <stop offset="100%" style="stop-color:#FF5722"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGradient)"/>

  <!-- Main title -->
  <text x="100" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="96" font-weight="bold" fill="white" filter="url(#glow)">FFmpeg</text>

  <!-- Subtitle with gradient -->
  <text x="100" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="48" fill="url(#accentGradient)">Complete Guide</text>

  <!-- Decorative line -->
  <rect x="100" y="390" width="300" height="4" rx="2" fill="url(#accentGradient)"/>

  <!-- Description -->
  <text x="100" y="450" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#8892b0">
    <tspan>Video Processing " Streaming " Encoding</tspan>
  </text>

  <!-- Terminal-style code hint (right side) -->
  <g transform="translate(750, 180)">
    <rect x="0" y="0" width="380" height="280" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <!-- Title bar -->
    <circle cx="25" cy="25" r="8" fill="#ff5f57"/>
    <circle cx="55" cy="25" r="8" fill="#febc2e"/>
    <circle cx="85" cy="25" r="8" fill="#28c840"/>
    <text x="100" y="30" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">terminal</text>
    <!-- Code lines -->
    <text x="20" y="80" font-family="'Courier New', monospace" font-size="16" fill="#7ee787">$ ffmpeg -i input.mp4</text>
    <text x="20" y="115" font-family="'Courier New', monospace" font-size="16" fill="#79c0ff">-c:v libx264</text>
    <text x="20" y="150" font-family="'Courier New', monospace" font-size="16" fill="#79c0ff">-crf 23</text>
    <text x="20" y="185" font-family="'Courier New', monospace" font-size="16" fill="#79c0ff">-preset medium</text>
    <text x="20" y="220" font-family="'Courier New', monospace" font-size="16" fill="#ffa657">-c:a aac</text>
    <text x="20" y="255" font-family="'Courier New', monospace" font-size="16" fill="#8b949e">output.mp4</text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="580" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#5a6370" text-anchor="middle">
    ffmpeg-docs.vercel.app
  </text>
</svg>
