<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D32F2F"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="90" cy="90" r="85" fill="url(#bg)"/>
  <!-- FFmpeg text styling -->
  <text x="90" y="75" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">FFmpeg</text>
  <text x="90" y="105" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Guide</text>
  <!-- Decorative line -->
  <rect x="50" y="115" width="80" height="3" rx="1.5" fill="white" opacity="0.8"/>
  <!-- Version indicator -->
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.9">DOCS</text>
</svg>
